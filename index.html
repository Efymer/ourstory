<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OurStory — Legal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF8F6;
      color: #2D2D3A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .tagline {
      color: #6B6B7B;
      font-size: 15px;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 14px 20px;
      background: #FFF8F6;
      border: 1px solid #F0E0DB;
      border-radius: 12px;
      color: #2D2D3A;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.15s, border-color 0.15s;
    }
    .links a:hover {
      background: #FF6B6B;
      border-color: #FF6B6B;
      color: #fff;
    }
    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #9E9EAE;
    }
    .footer a { color: #FF6B6B; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#x2764;&#xFE0F;</div>
    <h1>OurStory</h1>
    <p class="tagline">Your shared map of memories, places &amp; milestones.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
      <a href="delete-account.html">Delete Your Account</a>
    </div>
    <p class="footer">
      Questions? <a href="mailto:support@ourstory.app">support@ourstory.app</a>
    </p>
  </div>
</body>
</html>
